    <text x="24" y="248" font-size="15" font-weight="800" fill="#0F172A">今日待复习</text>
    <text x="355" y="248" font-size="12" fill="#94A3B8" text-anchor="end">4 词</text>

    <!-- card 1 -->
    <rect x="20" y="262" width="335" height="72" rx="16" fill="#FFFFFF"/>
    <text x="38" y="294" font-size="17" font-weight="800" fill="#0F172A">efficient</text>
    <text x="132" y="294" font-size="12" font-style="italic" fill="#94A3B8">adj.</text>
    <text x="38" y="315" font-size="12" fill="#EF4444">上次答错 · 2 天前</text>
    <rect x="284" y="282" width="56" height="32" rx="16" fill="#FEE2E2"/>
    <text x="303" y="302" font-size="13" fill="#EF4444">↻</text>
    <text x="320" y="303" font-size="12" font-weight="700" fill="#EF4444" text-anchor="middle">复习</text>

    <!-- card 2 -->
    <rect x="20" y="342" width="335" height="72" rx="16" fill="#FFFFFF"/>
    <text x="38" y="374" font-size="17" font-weight="800" fill="#0F172A">reluctant</text>
    <text x="130" y="374" font-size="12" font-style="italic" fill="#94A3B8">adj.</text>
    <text x="38" y="395" font-size="12" fill="#EF4444">上次答错 · 3 天前</text>
    <rect x="284" y="362" width="56" height="32" rx="16" fill="#FEE2E2"/>
    <text x="303" y="382" font-size="13" fill="#EF4444">↻</text>
    <text x="320" y="383" font-size="12" font-weight="700" fill="#EF4444" text-anchor="middle">复习</text>

    <!-- card 3 -->
    <rect x="20" y="422" width="335" height="72" rx="16" fill="#FFFFFF"/>
    <text x="38" y="454" font-size="17" font-weight="800" fill="#0F172A">negotiate</text>
    <text x="132" y="454" font-size="12" font-style="italic" fill="#94A3B8">v.</text>
    <text x="38" y="475" font-size="12" fill="#64748B">模糊记忆 · 5 天前</text>
    <rect x="284" y="442" width="56" height="32" rx="16" fill="#DCFCE7"/>
    <text x="303" y="462" font-size="13" fill="#16A34A">↻</text>
    <text x="320" y="463" font-size="12" font-weight="700" fill="#16A34A" text-anchor="middle">复习</text>

    <!-- card 4 -->
    <rect x="20" y="502" width="335" height="72" rx="16" fill="#FFFFFF"/>
    <text x="38" y="534" font-size="17" font-weight="800" fill="#0F172A">substantial</text>
    <text x="146" y="534" font-size="12" font-style="italic" fill="#94A3B8">adj.</text>
    <text x="38" y="555" font-size="12" fill="#64748B">模糊记忆 · 6 天前</text>
    <rect x="284" y="522" width="56" height="32" rx="16" fill="#DCFCE7"/>
    <text x="303" y="542" font-size="13" fill="#16A34A">↻</text>
    <text x="320" y="543" font-size="12" font-weight="700" fill="#16A34A" text-anchor="middle">复习</text>

    <!-- start button -->
    <rect x="20" y="656" width="335" height="56" rx="16" fill="#22C55E"/>
    <text x="187" y="690" font-size="17" font-weight="800" fill="#fff" text-anchor="middle">开始复习（18）</text>

    <!-- bottom nav -->
    <rect x="0" y="740" width="375" height="72" fill="#FFFFFF"/>
    <line x1="0" y1="740" x2="375" y2="740" stroke="#E2E8F0" stroke-width="1"/>
    <g text-anchor="middle">
      <text x="47" y="772" font-size="20" opacity="0.4">🏠</text><text x="47" y="792" font-size="10" fill="#94A3B8">首页</text>
      <text x="141" y="772" font-size="20">📚</text><text x="141" y="792" font-size="10" font-weight="700" fill="#22C55E">学习</text>
      <text x="235" y="772" font-size="20" opacity="0.4">🎙</text><text x="235" y="792" font-size="10" fill="#94A3B8">口语</text>
      <text x="329" y="772" font-size="20" opacity="0.4">👤</text><text x="329" y="792" font-size="10" fill="#94A3B8">我的</text>
