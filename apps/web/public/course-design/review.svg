<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812" font-family="-apple-system, 'PingFang SC', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <clipPath id="frame"><rect x="0" y="0" width="375" height="812" rx="40"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect x="0" y="0" width="375" height="812" fill="#F1F5F9"/>

    <!-- status bar -->
    <text x="24" y="30" font-size="14" font-weight="700" fill="#0F172A">9:41</text>
    <g fill="#0F172A"><rect x="316" y="20" width="18" height="11" rx="2"/><rect x="337" y="22" width="2" height="7" rx="1"/><circle cx="300" cy="26" r="2.5"/><circle cx="292" cy="26" r="2.5"/><circle cx="284" cy="26" r="2.5"/></g>

    <!-- title -->
    <text x="24" y="80" font-size="22" font-weight="800" fill="#0F172A">复习 · 错题本</text>
    <text x="24" y="104" font-size="13" fill="#64748B">间隔重复，稳固记忆</text>

    <!-- stat pills -->
    <rect x="20" y="122" width="163" height="46" rx="14" fill="#FEF3C7"/>
    <text x="38" y="145" font-size="13" fill="#B45309">待复习</text>
    <text x="38" y="162" font-size="12" fill="#B45309" opacity="0.7">need review</text>
    <text x="165" y="154" font-size="22" font-weight="800" fill="#B45309" text-anchor="end">18</text>

    <rect x="192" y="122" width="163" height="46" rx="14" fill="#DCFCE7"/>
    <text x="210" y="145" font-size="13" fill="#15803D">已掌握</text>
    <text x="210" y="162" font-size="12" fill="#15803D" opacity="0.7">mastered</text>
    <text x="337" y="154" font-size="22" font-weight="800" fill="#16A34A" text-anchor="end">156</text>

    <!-- category tabs -->
    <g>
      <rect x="20" y="184" width="64" height="32" rx="16" fill="#22C55E"/>
      <text x="52" y="205" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">单词</text>
      <rect x="92" y="184" width="64" height="32" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <text x="124" y="205" font-size="13" font-weight="700" fill="#64748B" text-anchor="middle">语法</text>
      <rect x="164" y="184" width="64" height="32" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <text x="196" y="205" font-size="13" font-weight="700" fill="#64748B" text-anchor="middle">口语</text>
    </g>

