    <text x="332" y="544" font-size="15" text-anchor="middle" fill="#CBD5E1">›</text>

    <!-- task 5 locked -->
    <rect x="20" y="574" width="335" height="56" rx="14" fill="#FFFFFF"/>
    <circle cx="52" cy="602" r="18" fill="#F1F5F9"/><text x="52" y="608" font-size="17" text-anchor="middle">👂</text>
    <text x="82" y="597" font-size="14" font-weight="700" fill="#0F172A">听力理解</text>
    <text x="82" y="615" font-size="11" fill="#94A3B8">短对话 · 2 题</text>
    <text x="332" y="608" font-size="15" text-anchor="middle" fill="#CBD5E1">›</text>

    <!-- task 6 checkin locked -->
    <rect x="20" y="638" width="335" height="56" rx="14" fill="#FFFFFF"/>
    <circle cx="52" cy="666" r="18" fill="#FEF3C7"/><text x="52" y="672" font-size="16" text-anchor="middle">🏆</text>
