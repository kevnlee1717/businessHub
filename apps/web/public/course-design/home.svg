    <circle cx="52" cy="538" r="18" fill="#F1F5F9"/><text x="52" y="544" font-size="17" text-anchor="middle">📖</text>
    <text x="82" y="533" font-size="14" font-weight="700" fill="#0F172A">语法微课 + 即时练</text>
