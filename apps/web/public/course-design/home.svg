    <!-- task 1 done -->
    <rect x="20" y="294" width="335" height="60" rx="14" fill="#FFFFFF"/>
    <circle cx="52" cy="324" r="18" fill="#DCFCE7"/><text x="52" y="330" font-size="17" text-anchor="middle">🔥</text>
    <text x="82" y="319" font-size="14" font-weight="700" fill="#94A3B8">词汇闪卡 Warm-up</text>
