    <line x1="0" y1="740" x2="375" y2="740" stroke="#E2E8F0" stroke-width="1"/>
    <g text-anchor="middle">
      <text x="47" y="772" font-size="20">🏠</text><text x="47" y="792" font-size="10" font-weight="700" fill="#22C55E">首页</text>
      <text x="141" y="772" font-size="20" opacity="0.4">📚</text><text x="141" y="792" font-size="10" fill="#94A3B8">学习</text>
      <text x="235" y="772" font-size="20" opacity="0.4">🎙</text><text x="235" y="792" font-size="10" fill="#94A3B8">口语</text>
      <text x="329" y="772" font-size="20" opacity="0.4">👤</text><text x="329" y="792" font-size="10" fill="#94A3B8">我的</text>
