    <rect x="20" y="362" width="335" height="60" rx="14" fill="#FFFFFF"/>
    <circle cx="52" cy="392" r="18" fill="#EEF2FF"/><text x="52" y="398" font-size="17" text-anchor="middle">🎙</text>
