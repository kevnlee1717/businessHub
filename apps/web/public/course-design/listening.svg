      <rect x="220" y="144" width="4" height="22" rx="2" fill="#CBD5E1"/>
      <rect x="230" y="150" width="4" height="10" rx="2" fill="#CBD5E1"/>
      <rect x="240" y="140" width="4" height="30" rx="2" fill="#CBD5E1"/>
      <rect x="250" y="148" width="4" height="14" rx="2" fill="#CBD5E1"/>
