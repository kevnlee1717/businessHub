<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812" font-family="-apple-system, 'PingFang SC', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <clipPath id="frame"><rect x="0" y="0" width="375" height="812" rx="40"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect x="0" y="0" width="375" height="812" fill="#F1F5F9"/>

    <!-- status bar -->
    <text x="24" y="30" font-size="14" font-weight="700" fill="#0F172A">9:41</text>
    <g fill="#0F172A"><rect x="316" y="20" width="18" height="11" rx="2"/><rect x="337" y="22" width="2" height="7" rx="1"/><circle cx="300" cy="26" r="2.5"/><circle cx="292" cy="26" r="2.5"/><circle cx="284" cy="26" r="2.5"/></g>

    <!-- page title -->
    <text x="24" y="72" font-size="22" font-weight="800" fill="#0F172A">口语预约</text>

    <!-- tabs -->
    <rect x="20" y="88" width="167" height="44" rx="14" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
    <text x="103" y="115" font-size="14" font-weight="800" fill="#16A34A" text-anchor="middle">1v1 外教</text>
    <rect x="192" y="88" width="163" height="44" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="273" y="115" font-size="14" font-weight="600" fill="#64748B" text-anchor="middle">周末线下口语角</text>

    <!-- date row -->
    <text x="24" y="164" font-size="15" font-weight="800" fill="#0F172A">选择日期</text>
    <g text-anchor="middle">
      <rect x="20" y="176" width="42" height="58" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
      <text x="41" y="200" font-size="11" fill="#94A3B8">周一</text><text x="41" y="220" font-size="14" font-weight="700" fill="#0F172A">7/6</text>
      <rect x="68" y="176" width="42" height="58" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
      <text x="89" y="200" font-size="11" fill="#94A3B8">周二</text><text x="89" y="220" font-size="14" font-weight="700" fill="#0F172A">7/7</text>
      <rect x="116" y="176" width="42" height="58" rx="12" fill="#22C55E"/>
      <text x="137" y="200" font-size="11" fill="#DCFCE7">周三</text><text x="137" y="220" font-size="14" font-weight="800" fill="#fff">7/8</text>
      <rect x="164" y="176" width="42" height="58" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
      <text x="185" y="200" font-size="11" fill="#94A3B8">周四</text><text x="185" y="220" font-size="14" font-weight="700" fill="#0F172A">7/9</text>
      <rect x="212" y="176" width="42" height="58" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
      <text x="233" y="200" font-size="11" fill="#94A3B8">周五</text><text x="233" y="220" font-size="14" font-weight="700" fill="#0F172A">7/10</text>
      <rect x="260" y="176" width="42" height="58" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
      <text x="281" y="200" font-size="11" fill="#94A3B8">周六</text><text x="281" y="220" font-size="14" font-weight="700" fill="#0F172A">7/11</text>
      <rect x="308" y="176" width="42" height="58" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
      <text x="329" y="200" font-size="11" fill="#94A3B8">周日</text><text x="329" y="220" font-size="14" font-weight="700" fill="#0F172A">7/12</text>
    </g>

    <!-- time grid -->
    <text x="24" y="266" font-size="15" font-weight="800" fill="#0F172A">选择时间段</text>
    <g text-anchor="middle">
      <!-- row 1 -->
      <rect x="20" y="278" width="163" height="42" rx="12" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5"/>
      <text x="101" y="304" font-size="14" font-weight="700" fill="#16A34A">10:00</text>
      <rect x="192" y="278" width="163" height="42" rx="12" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1.5"/>
      <text x="273" y="304" font-size="14" font-weight="600" fill="#CBD5E1">10:30 已约</text>
      <!-- row 2 -->
      <rect x="20" y="330" width="163" height="42" rx="12" fill="#22C55E"/>
      <text x="101" y="356" font-size="14" font-weight="800" fill="#fff">11:00</text>
      <rect x="192" y="330" width="163" height="42" rx="12" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5"/>
      <text x="273" y="356" font-size="14" font-weight="700" fill="#16A34A">11:30</text>
      <!-- row 3 -->
      <rect x="20" y="382" width="163" height="42" rx="12" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1.5"/>
      <text x="101" y="408" font-size="14" font-weight="600" fill="#CBD5E1">14:00 已约</text>
      <rect x="192" y="382" width="163" height="42" rx="12" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5"/>
      <text x="273" y="408" font-size="14" font-weight="700" fill="#16A34A">14:30</text>
    </g>

    <!-- tutor card -->
    <rect x="20" y="446" width="335" height="96" rx="16" fill="#FFFFFF"/>
    <circle cx="64" cy="494" r="30" fill="#EEF2FF"/>
    <text x="64" y="504" font-size="26" font-weight="800" fill="#6366F1" text-anchor="middle">S</text>
    <text x="110" y="482" font-size="16" font-weight="800" fill="#0F172A">Sarah W.</text>
    <text x="110" y="504" font-size="13" fill="#F59E0B">⭐ 4.9</text>
    <text x="150" y="504" font-size="13" fill="#94A3B8">(128)</text>
    <rect x="110" y="516" width="120" height="22" rx="11" fill="#EEF2FF"/>
    <text x="170" y="531" font-size="11" font-weight="700" fill="#6366F1" text-anchor="middle">母语 · 商务英语</text>
    <text x="337" y="482" font-size="15" font-weight="800" fill="#16A34A" text-anchor="end">S$35</text>
    <text x="337" y="503" font-size="12" fill="#94A3B8" text-anchor="end">25 min</text>

    <!-- summary -->
    <text x="24" y="586" font-size="13" fill="#64748B">已选 <tspan font-weight="800" fill="#0F172A">7/8 周三 · 11:00</tspan> · 与 Sarah W.</text>

    <!-- CTA -->
    <rect x="20" y="660" width="335" height="56" rx="28" fill="#22C55E"/>
    <text x="187" y="694" font-size="17" font-weight="800" fill="#fff" text-anchor="middle">确认预约</text>

    <!-- bottom nav -->
    <rect x="0" y="740" width="375" height="72" fill="#FFFFFF"/>
    <line x1="0" y1="740" x2="375" y2="740" stroke="#E2E8F0" stroke-width="1"/>
    <g text-anchor="middle">
      <text x="47" y="772" font-size="20" opacity="0.4">🏠</text><text x="47" y="792" font-size="10" fill="#94A3B8">首页</text>
      <text x="141" y="772" font-size="20" opacity="0.4">📚</text><text x="141" y="792" font-size="10" fill="#94A3B8">学习</text>
      <text x="235" y="772" font-size="20">🎙</text><text x="235" y="792" font-size="10" font-weight="700" fill="#22C55E">口语</text>
      <text x="329" y="772" font-size="20" opacity="0.4">👤</text><text x="329" y="792" font-size="10" fill="#94A3B8">我的</text>
    </g>
  </g>
  <rect x="0.5" y="0.5" width="374" height="811" rx="40" fill="none" stroke="#CBD5E1" stroke-width="1"/>
</svg>
