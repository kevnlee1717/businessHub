<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812" font-family="-apple-system, 'PingFang SC', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <clipPath id="frame"><rect x="0" y="0" width="375" height="812" rx="40"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect x="0" y="0" width="375" height="812" fill="#F1F5F9"/>

    <!-- status bar -->
    <text x="24" y="30" font-size="14" font-weight="700" fill="#0F172A">9:41</text>
    <g fill="#0F172A"><rect x="316" y="20" width="18" height="11" rx="2"/><rect x="337" y="22" width="2" height="7" rx="1"/><circle cx="300" cy="26" r="2.5"/><circle cx="292" cy="26" r="2.5"/><circle cx="284" cy="26" r="2.5"/></g>

    <!-- title + countdown -->
    <text x="24" y="80" font-size="22" font-weight="800" fill="#0F172A">🥉 青铜联赛</text>
    <rect x="255" y="60" width="100" height="30" rx="15" fill="#FEF3C7"/>
    <text x="272" y="80" font-size="12">⏳</text>
    <text x="292" y="80" font-size="13" font-weight="700" fill="#B45309">还剩 2 天</text>

    <!-- subtitle -->
    <text x="24" y="106" font-size="13" font-weight="700" fill="#22C55E">本周前 10 名晋级白银联赛</text>

    <!-- list -->
    <!-- row 1 -->
    <rect x="20" y="122" width="335" height="52" rx="14" fill="#FFFFFF"/>
    <text x="46" y="153" font-size="20" text-anchor="middle">🥇</text>
    <circle cx="80" cy="148" r="15" fill="#FEF3C7"/><text x="80" y="153" font-size="14" text-anchor="middle">🦊</text>
    <text x="104" y="153" font-size="14" font-weight="700" fill="#0F172A">Grace</text>
    <text x="337" y="153" font-size="14" font-weight="800" fill="#F59E0B" text-anchor="end">2,180 XP</text>

    <!-- row 2 -->
    <rect x="20" y="180" width="335" height="52" rx="14" fill="#FFFFFF"/>
    <text x="46" y="211" font-size="20" text-anchor="middle">🥈</text>
    <circle cx="80" cy="206" r="15" fill="#EEF2FF"/><text x="80" y="211" font-size="14" text-anchor="middle">🐼</text>
    <text x="104" y="211" font-size="14" font-weight="700" fill="#0F172A">Daniel</text>
    <text x="337" y="211" font-size="14" font-weight="800" fill="#94A3B8" text-anchor="end">1,940 XP</text>

    <!-- row 3 -->
    <rect x="20" y="238" width="335" height="52" rx="14" fill="#FFFFFF"/>
    <text x="46" y="269" font-size="20" text-anchor="middle">🥉</text>
    <circle cx="80" cy="264" r="15" fill="#F3E8FF"/><text x="80" y="269" font-size="14" text-anchor="middle">🐨</text>
    <text x="104" y="269" font-size="14" font-weight="700" fill="#0F172A">Sophia</text>
    <text x="337" y="269" font-size="14" font-weight="800" fill="#B45309" text-anchor="end">1,760 XP</text>

    <!-- row 4 you highlighted -->
    <rect x="20" y="296" width="335" height="52" rx="14" fill="#DCFCE7"/>
    <circle cx="46" cy="322" r="13" fill="#22C55E"/><text x="46" y="327" font-size="13" font-weight="800" fill="#fff" text-anchor="middle">4</text>
    <circle cx="80" cy="322" r="15" fill="#22C55E"/><text x="80" y="327" font-size="14" text-anchor="middle">🐯</text>
    <text x="104" y="327" font-size="14" font-weight="800" fill="#16A34A">你</text>
    <text x="337" y="327" font-size="14" font-weight="800" fill="#16A34A" text-anchor="end">1,530 XP</text>

    <!-- row 5 -->
    <rect x="20" y="354" width="335" height="52" rx="14" fill="#FFFFFF"/>
    <circle cx="46" cy="380" r="13" fill="#F1F5F9"/><text x="46" y="385" font-size="13" font-weight="800" fill="#64748B" text-anchor="middle">5</text>
    <circle cx="80" cy="380" r="15" fill="#FEE2E2"/><text x="80" y="385" font-size="14" text-anchor="middle">🐵</text>
    <text x="104" y="385" font-size="14" font-weight="700" fill="#0F172A">Marcus</text>
    <text x="337" y="385" font-size="14" font-weight="800" fill="#64748B" text-anchor="end">1,410 XP</text>

    <!-- row 6 -->
    <rect x="20" y="412" width="335" height="52" rx="14" fill="#FFFFFF"/>
    <circle cx="46" cy="438" r="13" fill="#F1F5F9"/><text x="46" y="443" font-size="13" font-weight="800" fill="#64748B" text-anchor="middle">6</text>
    <circle cx="80" cy="438" r="15" fill="#DCFCE7"/><text x="80" y="443" font-size="14" text-anchor="middle">🐰</text>
    <text x="104" y="443" font-size="14" font-weight="700" fill="#0F172A">Emily</text>
    <text x="337" y="443" font-size="14" font-weight="800" fill="#64748B" text-anchor="end">1,280 XP</text>

    <!-- row 7 -->
    <rect x="20" y="470" width="335" height="52" rx="14" fill="#FFFFFF"/>
    <circle cx="46" cy="496" r="13" fill="#F1F5F9"/><text x="46" y="501" font-size="13" font-weight="800" fill="#64748B" text-anchor="middle">10</text>
    <circle cx="80" cy="496" r="15" fill="#EEF2FF"/><text x="80" y="501" font-size="14" text-anchor="middle">🐧</text>
    <text x="104" y="501" font-size="14" font-weight="700" fill="#0F172A">Oliver</text>
    <text x="337" y="501" font-size="14" font-weight="800" fill="#64748B" text-anchor="end">960 XP</text>

    <!-- promotion line -->
    <line x1="20" y1="540" x2="355" y2="540" stroke="#22C55E" stroke-width="2" stroke-dasharray="6 5"/>
    <rect x="140" y="528" width="95" height="24" rx="12" fill="#DCFCE7"/>
    <text x="187" y="544" font-size="12" font-weight="800" fill="#16A34A" text-anchor="middle">↑ 晋级线</text>

    <!-- row 8 below line -->
    <rect x="20" y="558" width="335" height="52" rx="14" fill="#FFFFFF" opacity="0.85"/>
    <circle cx="46" cy="584" r="13" fill="#F1F5F9"/><text x="46" y="589" font-size="13" font-weight="800" fill="#94A3B8" text-anchor="middle">11</text>
    <circle cx="80" cy="584" r="15" fill="#F3E8FF"/><text x="80" y="589" font-size="14" text-anchor="middle">🐻</text>
    <text x="104" y="589" font-size="14" font-weight="700" fill="#64748B">Chloe</text>
    <text x="337" y="589" font-size="14" font-weight="800" fill="#94A3B8" text-anchor="end">870 XP</text>

    <!-- row 9 below line -->
    <rect x="20" y="616" width="335" height="52" rx="14" fill="#FFFFFF" opacity="0.85"/>
    <circle cx="46" cy="642" r="13" fill="#F1F5F9"/><text x="46" y="647" font-size="13" font-weight="800" fill="#94A3B8" text-anchor="middle">12</text>
    <circle cx="80" cy="642" r="15" fill="#FEF3C7"/><text x="80" y="647" font-size="14" text-anchor="middle">🐶</text>
    <text x="104" y="647" font-size="14" font-weight="700" fill="#64748B">Ryan</text>
    <text x="337" y="647" font-size="14" font-weight="800" fill="#94A3B8" text-anchor="end">720 XP</text>

    <!-- hint -->
    <text x="187" y="706" font-size="12" fill="#94A3B8" text-anchor="middle">保持学习，冲进前 10 晋级白银 🥈</text>

    <!-- bottom nav -->
    <rect x="0" y="740" width="375" height="72" fill="#FFFFFF"/>
    <line x1="0" y1="740" x2="375" y2="740" stroke="#E2E8F0" stroke-width="1"/>
    <g text-anchor="middle">
      <text x="47" y="772" font-size="20" opacity="0.4">🏠</text><text x="47" y="792" font-size="10" fill="#94A3B8">首页</text>
      <text x="141" y="772" font-size="20">📚</text><text x="141" y="792" font-size="10" font-weight="700" fill="#22C55E">学习</text>
      <text x="235" y="772" font-size="20" opacity="0.4">🎙</text><text x="235" y="792" font-size="10" fill="#94A3B8">口语</text>
      <text x="329" y="772" font-size="20" opacity="0.4">👤</text><text x="329" y="792" font-size="10" fill="#94A3B8">我的</text>
    </g>
  </g>
  <rect x="0.5" y="0.5" width="374" height="811" rx="40" fill="none" stroke="#CBD5E1" stroke-width="1"/>
</svg>
