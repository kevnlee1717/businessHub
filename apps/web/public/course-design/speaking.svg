<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812" font-family="-apple-system, 'PingFang SC', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <clipPath id="frame"><rect x="0" y="0" width="375" height="812" rx="40"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect x="0" y="0" width="375" height="812" fill="#F1F5F9"/>

    <!-- status bar -->
    <text x="24" y="30" font-size="14" font-weight="700" fill="#0F172A">9:41</text>
    <g fill="#0F172A"><rect x="316" y="20" width="18" height="11" rx="2"/><rect x="337" y="22" width="2" height="7" rx="1"/><circle cx="300" cy="26" r="2.5"/><circle cx="292" cy="26" r="2.5"/><circle cx="284" cy="26" r="2.5"/></g>

    <!-- header -->
    <text x="26" y="72" font-size="22" fill="#64748B">✕</text>
    <text x="187" y="70" font-size="17" font-weight="800" fill="#0F172A" text-anchor="middle">口语跟读</text>
    <text x="351" y="70" font-size="14" font-weight="700" fill="#64748B" text-anchor="end">3/8</text>

    <!-- target sentence card -->
    <rect x="20" y="96" width="335" height="96" rx="16" fill="#FFFFFF"/>
    <text x="187" y="122" font-size="12" fill="#94A3B8" text-anchor="middle">跟读下面这句话</text>
    <text x="187" y="152" font-size="17" font-weight="700" text-anchor="middle">
      <tspan fill="#16A34A">I'd like a cup of </tspan><tspan fill="#EF4444">coffee</tspan><tspan fill="#0F172A">, please.</tspan>
    </text>
    <text x="187" y="176" font-size="13" fill="#94A3B8" text-anchor="middle" font-family="Segoe UI, sans-serif">/aɪd laɪk ə kʌp əv ˈkɔːfi pliːz/</text>

    <!-- waveform -->
    <g fill="#22C55E">
      <rect x="96" y="220" width="5" height="14" rx="2.5"/>
      <rect x="108" y="212" width="5" height="30" rx="2.5"/>
      <rect x="120" y="204" width="5" height="46" rx="2.5"/>
      <rect x="132" y="216" width="5" height="22" rx="2.5"/>
      <rect x="144" y="200" width="5" height="54" rx="2.5"/>
      <rect x="156" y="210" width="5" height="34" rx="2.5"/>
      <rect x="168" y="222" width="5" height="10" rx="2.5"/>
      <rect x="180" y="206" width="5" height="42" rx="2.5"/>
      <rect x="192" y="214" width="5" height="26" rx="2.5"/>
      <rect x="204" y="202" width="5" height="50" rx="2.5"/>
      <rect x="216" y="218" width="5" height="18" rx="2.5"/>
      <rect x="228" y="208" width="5" height="38" rx="2.5"/>
      <rect x="240" y="216" width="5" height="22" rx="2.5"/>
      <rect x="252" y="204" width="5" height="46" rx="2.5"/>
      <rect x="264" y="222" width="5" height="10" rx="2.5"/>
      <rect x="276" y="212" width="5" height="30" rx="2.5"/>
    </g>

    <!-- mic button -->
    <circle cx="187" cy="312" r="52" fill="#DCFCE7"/>
    <circle cx="187" cy="312" r="40" fill="#22C55E"/>
    <text x="187" y="324" font-size="34" text-anchor="middle">🎙</text>
    <text x="187" y="386" font-size="13" fill="#64748B" text-anchor="middle">录音中 · 点击停止</text>

    <!-- score panel -->
    <rect x="20" y="410" width="335" height="150" rx="16" fill="#FFFFFF"/>
    <!-- score ring -->
    <circle cx="90" cy="485" r="40" fill="none" stroke="#E2E8F0" stroke-width="9"/>
    <circle cx="90" cy="485" r="40" fill="none" stroke="#22C55E" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="206 251" transform="rotate(-90 90 485)"/>
    <text x="90" y="490" font-size="28" font-weight="800" fill="#0F172A" text-anchor="middle">82</text>
    <text x="90" y="540" font-size="12" fill="#64748B" text-anchor="middle">综合评分</text>

    <!-- score bars -->
    <text x="160" y="447" font-size="13" fill="#64748B">发音</text>
    <text x="340" y="447" font-size="13" font-weight="800" fill="#16A34A" text-anchor="end">78</text>
    <rect x="160" y="454" width="180" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="160" y="454" width="140" height="8" rx="4" fill="#22C55E"/>

    <text x="160" y="489" font-size="13" fill="#64748B">流利度</text>
    <text x="340" y="489" font-size="13" font-weight="800" fill="#16A34A" text-anchor="end">85</text>
    <rect x="160" y="496" width="180" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="160" y="496" width="153" height="8" rx="4" fill="#22C55E"/>

    <text x="160" y="531" font-size="13" fill="#64748B">语调</text>
    <text x="340" y="531" font-size="13" font-weight="800" fill="#16A34A" text-anchor="end">84</text>
    <rect x="160" y="538" width="180" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="160" y="538" width="151" height="8" rx="4" fill="#22C55E"/>

    <!-- tip -->
    <rect x="20" y="578" width="335" height="44" rx="14" fill="#FEF3C7"/>
    <text x="38" y="605" font-size="13" fill="#B45309">💡 coffee 的 /ɔː/ 音再饱满一点</text>

    <!-- buttons -->
    <rect x="20" y="646" width="160" height="54" rx="27" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="100" y="680" font-size="16" font-weight="700" fill="#64748B" text-anchor="middle">重录</text>
    <rect x="195" y="646" width="160" height="54" rx="27" fill="#22C55E"/>
    <text x="275" y="680" font-size="16" font-weight="800" fill="#FFFFFF" text-anchor="middle">下一句</text>
  </g>
  <rect x="0.5" y="0.5" width="374" height="811" rx="40" fill="none" stroke="#CBD5E1" stroke-width="1"/>
</svg>
