<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812" font-family="-apple-system, 'PingFang SC', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <clipPath id="frame"><rect x="0" y="0" width="375" height="812" rx="40"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect x="0" y="0" width="375" height="812" fill="#F1F5F9"/>

    <!-- status bar -->
    <text x="24" y="30" font-size="14" font-weight="700" fill="#0F172A">9:41</text>
    <g fill="#0F172A"><rect x="316" y="20" width="18" height="11" rx="2"/><rect x="337" y="22" width="2" height="7" rx="1"/><circle cx="300" cy="26" r="2.5"/><circle cx="292" cy="26" r="2.5"/><circle cx="284" cy="26" r="2.5"/></g>

    <!-- header -->
    <text x="24" y="72" font-size="24" fill="#64748B">‹</text>
    <text x="52" y="70" font-size="17" font-weight="800" fill="#0F172A">L2 基础 · 生活通</text>
    <rect x="270" y="52" width="85" height="30" rx="15" fill="#DCFCE7"/>
    <text x="312" y="72" font-size="12" font-weight="800" fill="#15803D" text-anchor="middle">第 3 单元</text>
    <line x1="0" y1="96" x2="375" y2="96" stroke="#E2E8F0" stroke-width="1"/>

    <!-- connector dots -->
    <g fill="#CBD5E1">
      <circle cx="155" cy="152" r="3"/><circle cx="170" cy="167" r="3"/>
      <circle cx="220" cy="200" r="3"/><circle cx="235" cy="217" r="3"/>
      <circle cx="243" cy="270" r="3"/><circle cx="228" cy="287" r="3"/>
      <circle cx="185" cy="340" r="3"/><circle cx="170" cy="357" r="3"/>
      <circle cx="155" cy="418" r="3"/><circle cx="145" cy="437" r="3"/>
      <circle cx="140" cy="500" r="3"/><circle cx="160" cy="516" r="3"/>
      <circle cx="220" cy="565" r="3"/><circle cx="235" cy="582" r="3"/>
    </g>

    <!-- node 1 done -->
    <circle cx="140" cy="140" r="26" fill="#22C55E"/>
    <path d="M129 140 l7 7 l13 -14" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- node 2 done -->
    <circle cx="240" cy="185" r="26" fill="#22C55E"/>
    <path d="M229 185 l7 7 l13 -14" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- node 3 done -->
    <circle cx="205" cy="305" r="26" fill="#22C55E"/>
    <path d="M194 305 l7 7 l13 -14" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- treasure jump test -->
    <rect x="122" y="358" width="52" height="52" rx="16" fill="#F59E0B"/>
    <text x="148" y="393" font-size="24" text-anchor="middle">🏆</text>
    <text x="148" y="430" font-size="12" font-weight="700" fill="#B45309" text-anchor="middle">跳级测试</text>

    <!-- node current -->
    <circle cx="130" cy="470" r="38" fill="#DCFCE7"/>
    <circle cx="130" cy="470" r="30" fill="#22C55E"/>
    <text x="130" y="479" font-size="24" text-anchor="middle">⭐</text>
    <rect x="94" y="512" width="72" height="30" rx="15" fill="#16A34A"/>
    <text x="130" y="532" font-size="13" font-weight="800" fill="#FFFFFF" text-anchor="middle">继续</text>

    <!-- node locked 1 -->
    <circle cx="185" cy="585" r="26" fill="#E2E8F0"/>
    <text x="185" y="592" font-size="18" text-anchor="middle">🔒</text>

    <!-- node locked 2 -->
    <circle cx="255" cy="655" r="26" fill="#E2E8F0"/>
    <text x="255" y="662" font-size="18" text-anchor="middle">🔒</text>
    <g fill="#CBD5E1">
      <circle cx="208" cy="625" r="3"/><circle cx="223" cy="640" r="3"/>
    </g>

    <!-- bottom nav -->
    <rect x="0" y="740" width="375" height="72" fill="#FFFFFF"/>
    <line x1="0" y1="740" x2="375" y2="740" stroke="#E2E8F0" stroke-width="1"/>
    <g text-anchor="middle">
      <text x="47" y="772" font-size="20" opacity="0.4">🏠</text><text x="47" y="792" font-size="10" fill="#94A3B8">首页</text>
      <text x="141" y="772" font-size="20">📚</text><text x="141" y="792" font-size="10" font-weight="700" fill="#22C55E">学习</text>
      <text x="235" y="772" font-size="20" opacity="0.4">🎙</text><text x="235" y="792" font-size="10" fill="#94A3B8">口语</text>
      <text x="329" y="772" font-size="20" opacity="0.4">👤</text><text x="329" y="792" font-size="10" fill="#94A3B8">我的</text>
    </g>
  </g>
  <rect x="0.5" y="0.5" width="374" height="811" rx="40" fill="none" stroke="#CBD5E1" stroke-width="1"/>
</svg>
