<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812" font-family="-apple-system, 'PingFang SC', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <clipPath id="frame"><rect x="0" y="0" width="375" height="812" rx="40"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect x="0" y="0" width="375" height="812" fill="#F1F5F9"/>

    <!-- status bar -->
    <text x="24" y="30" font-size="14" font-weight="700" fill="#0F172A">9:41</text>
    <g fill="#0F172A"><rect x="316" y="20" width="18" height="11" rx="2"/><rect x="337" y="22" width="2" height="7" rx="1"/><circle cx="300" cy="26" r="2.5"/><circle cx="292" cy="26" r="2.5"/><circle cx="284" cy="26" r="2.5"/></g>

    <!-- back arrow + progress -->
    <text x="24" y="72" font-size="24" fill="#64748B">‹</text>
    <rect x="52" y="55" width="253" height="10" rx="5" fill="#E2E8F0"/>
    <rect x="52" y="55" width="101" height="10" rx="5" fill="#22C55E"/>
    <text x="351" y="64" font-size="12" font-weight="700" fill="#64748B" text-anchor="end">6 / 15</text>

    <!-- title -->
    <text x="24" y="112" font-size="22" font-weight="800" fill="#0F172A">定级测评</text>
    <text x="24" y="136" font-size="13" fill="#64748B">AI 自适应 · 答对变难，答错变易</text>

    <!-- question prompt -->
    <text x="24" y="182" font-size="17" font-weight="800" fill="#0F172A">🎧 听录音，选择正确的回应</text>

    <!-- play button card -->
    <rect x="20" y="200" width="335" height="140" rx="16" fill="#FFFFFF"/>
    <circle cx="187" cy="270" r="42" fill="#EEF2FF"/>
    <circle cx="187" cy="270" r="30" fill="#6366F1"/>
    <path d="M180 256 l18 14 l-18 14 z" fill="#FFFFFF"/>
    <text x="187" y="330" font-size="12" fill="#94A3B8" text-anchor="middle">点击播放 · 可重复收听</text>

    <!-- options -->
    <!-- A -->
    <rect x="20" y="360" width="335" height="58" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <circle cx="50" cy="389" r="15" fill="#F1F5F9"/><text x="50" y="394" font-size="14" font-weight="800" fill="#64748B" text-anchor="middle">A</text>
    <text x="78" y="394" font-size="15" fill="#0F172A">Yes, I went there last week.</text>

    <!-- B selected -->
    <rect x="20" y="426" width="335" height="58" rx="14" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
    <circle cx="50" cy="455" r="15" fill="#22C55E"/><text x="50" y="460" font-size="14" font-weight="800" fill="#FFFFFF" text-anchor="middle">B</text>
    <text x="78" y="460" font-size="15" font-weight="700" fill="#0F172A">Sure, I'd love to join you.</text>

    <!-- C -->
    <rect x="20" y="492" width="335" height="58" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <circle cx="50" cy="521" r="15" fill="#F1F5F9"/><text x="50" y="526" font-size="14" font-weight="800" fill="#64748B" text-anchor="middle">C</text>
    <text x="78" y="526" font-size="15" fill="#0F172A">It's on the second floor.</text>

    <!-- check button -->
    <rect x="20" y="612" width="335" height="54" rx="27" fill="#22C55E"/>
    <text x="187" y="646" font-size="17" font-weight="800" fill="#FFFFFF" text-anchor="middle">检查</text>

    <!-- footnote -->
    <text x="187" y="696" font-size="12" fill="#94A3B8" text-anchor="middle">已定级参考：L2 基础</text>
  </g>
  <rect x="0.5" y="0.5" width="374" height="811" rx="40" fill="none" stroke="#CBD5E1" stroke-width="1"/>
</svg>
