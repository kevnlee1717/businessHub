<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812" font-family="-apple-system, 'PingFang SC', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <clipPath id="frame"><rect x="0" y="0" width="375" height="812" rx="40"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect x="0" y="0" width="375" height="812" fill="#F1F5F9"/>

    <!-- status bar -->
    <text x="24" y="30" font-size="14" font-weight="700" fill="#0F172A">9:41</text>
    <g fill="#0F172A"><rect x="316" y="20" width="18" height="11" rx="2"/><rect x="337" y="22" width="2" height="7" rx="1"/><circle cx="300" cy="26" r="2.5"/><circle cx="292" cy="26" r="2.5"/><circle cx="284" cy="26" r="2.5"/></g>

    <!-- header: close + progress + hearts -->
    <text x="22" y="72" font-size="24" fill="#64748B">✕</text>
    <rect x="56" y="58" width="230" height="12" rx="6" fill="#E2E8F0"/>
    <rect x="56" y="58" width="138" height="12" rx="6" fill="#22C55E"/>
    <text x="345" y="72" font-size="15" font-weight="800" fill="#EF4444" text-anchor="end">❤ ×5</text>

    <!-- grammar card -->
    <rect x="20" y="94" width="335" height="132" rx="16" fill="#FFFFFF"/>
    <rect x="38" y="112" width="120" height="26" rx="13" fill="#EEF2FF"/>
    <text x="98" y="130" font-size="11" font-weight="800" fill="#4338CA" text-anchor="middle">语法微课</text>
    <text x="38" y="164" font-size="15" font-weight="800" fill="#0F172A">一般现在时 · 第三人称单数</text>
    <text x="38" y="190" font-size="14" fill="#64748B">He / She / It + 动词 + <tspan fill="#22C55E" font-weight="800">s</tspan></text>
    <rect x="38" y="200" width="299" height="1" fill="#E2E8F0"/>
    <text x="38" y="218" font-size="14" fill="#0F172A">例句：She <tspan fill="#22C55E" font-weight="800">goes</tspan> to work.</text>

    <!-- question -->
    <text x="24" y="266" font-size="13" font-weight="700" fill="#64748B">选择正确的句子填空</text>
    <rect x="20" y="278" width="335" height="58" rx="14" fill="#FFFFFF"/>
    <text x="187" y="314" font-size="17" font-weight="700" fill="#0F172A" text-anchor="middle">She ___ to work every day.</text>

    <!-- options -->
    <rect x="20" y="352" width="335" height="52" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="38" y="384" font-size="16" font-weight="700" fill="#0F172A">go</text>

    <rect x="20" y="416" width="335" height="52" rx="14" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
    <text x="38" y="448" font-size="16" font-weight="800" fill="#16A34A">goes</text>
    <circle cx="330" cy="442" r="13" fill="#22C55E"/><path d="M323 442 l5 5 l8 -9" stroke="#fff" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="20" y="480" width="335" height="52" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="38" y="512" font-size="16" font-weight="700" fill="#0F172A">going</text>

    <!-- success banner -->
    <rect x="20" y="612" width="335" height="52" rx="14" fill="#DCFCE7"/>
    <text x="38" y="644" font-size="15" font-weight="800" fill="#16A34A">✅ 答对了！</text>
    <text x="337" y="644" font-size="15" font-weight="800" fill="#16A34A" text-anchor="end">+10 XP</text>

    <!-- continue button -->
    <rect x="20" y="676" width="335" height="54" rx="16" fill="#22C55E"/>
    <text x="187" y="710" font-size="17" font-weight="800" fill="#FFFFFF" text-anchor="middle">继续</text>
  </g>
  <rect x="0.5" y="0.5" width="374" height="811" rx="40" fill="none" stroke="#CBD5E1" stroke-width="1"/>
</svg>
