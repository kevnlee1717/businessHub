<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812" font-family="-apple-system, 'PingFang SC', 'Segoe UI', Roboto, sans-serif">
  <defs>
    <clipPath id="frame"><rect x="0" y="0" width="375" height="812" rx="40"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect x="0" y="0" width="375" height="812" fill="#F1F5F9"/>

    <!-- status bar -->
    <text x="24" y="30" font-size="14" font-weight="700" fill="#0F172A">9:41</text>
    <g fill="#0F172A"><rect x="316" y="20" width="18" height="11" rx="2"/><rect x="337" y="22" width="2" height="7" rx="1"/><circle cx="300" cy="26" r="2.5"/><circle cx="292" cy="26" r="2.5"/><circle cx="284" cy="26" r="2.5"/></g>

    <!-- header -->
    <text x="22" y="72" font-size="24" fill="#64748B">✕</text>
    <text x="187" y="66" font-size="15" font-weight="800" fill="#0F172A" text-anchor="middle">☕ 咖啡店点单</text>
    <rect x="255" y="52" width="100" height="30" rx="15" fill="#EEF2FF"/>
    <text x="305" y="72" font-size="12" font-weight="700" fill="#4338CA" text-anchor="middle">角色：顾客</text>
    <line x1="0" y1="98" x2="375" y2="98" stroke="#E2E8F0" stroke-width="1"/>

    <!-- AI bubble 1 -->
    <circle cx="40" cy="140" r="18" fill="#EEF2FF"/><text x="40" y="146" font-size="17" text-anchor="middle">🤖</text>
    <rect x="66" y="124" width="238" height="52" rx="16" fill="#F1F5F9"/>
    <text x="84" y="147" font-size="15" fill="#0F172A">Hi! What can I get</text>
    <text x="84" y="167" font-size="15" fill="#0F172A">for you?</text>

    <!-- user bubble 1 -->
    <rect x="121" y="196" width="234" height="40" rx="16" fill="#22C55E"/>
    <text x="337" y="221" font-size="15" fill="#FFFFFF" text-anchor="end">I want a coffee, please.</text>

    <!-- correction card -->
    <rect x="66" y="252" width="289" height="76" rx="16" fill="#FEF3C7"/>
    <text x="84" y="278" font-size="13" font-weight="800" fill="#B45309">💡 更地道的说法</text>
    <text x="84" y="304" font-size="15" font-weight="700" fill="#0F172A">I'd like a coffee, please.</text>
    <text x="84" y="322" font-size="11" fill="#B45309">比 "I want" 更礼貌自然</text>

    <!-- AI bubble 2 -->
    <circle cx="40" cy="364" r="18" fill="#EEF2FF"/><text x="40" y="370" font-size="17" text-anchor="middle">🤖</text>
    <rect x="66" y="348" width="180" height="40" rx="16" fill="#F1F5F9"/>
    <text x="84" y="373" font-size="15" fill="#0F172A">Sure! Small or large?</text>

    <!-- user tip pill -->
    <rect x="103" y="408" width="252" height="34" rx="17" fill="#EEF2FF"/>
    <text x="229" y="430" font-size="12" font-weight="700" fill="#4338CA" text-anchor="middle">💬 试着回答：A small one, thanks.</text>

    <!-- input dock -->
    <rect x="0" y="640" width="375" height="172" fill="#FFFFFF"/>
    <line x1="0" y1="640" x2="375" y2="640" stroke="#E2E8F0" stroke-width="1"/>

    <circle cx="187" cy="708" r="42" fill="#6366F1"/>
    <circle cx="187" cy="708" r="52" fill="none" stroke="#EEF2FF" stroke-width="4"/>
    <text x="187" y="718" font-size="34" text-anchor="middle">🎙</text>
    <text x="187" y="778" font-size="13" font-weight="700" fill="#4338CA" text-anchor="middle">按住说话</text>

    <circle cx="315" cy="708" r="26" fill="#F1F5F9"/>
    <text x="315" y="716" font-size="22" text-anchor="middle">⌨</text>

    <circle cx="60" cy="708" r="26" fill="#F1F5F9"/>
    <text x="60" y="716" font-size="20" text-anchor="middle">🔄</text>
  </g>
  <rect x="0.5" y="0.5" width="374" height="811" rx="40" fill="none" stroke="#CBD5E1" stroke-width="1"/>
</svg>
